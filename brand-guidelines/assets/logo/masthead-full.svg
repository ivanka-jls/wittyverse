<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 260" width="1600" height="260" role="img" aria-label="Wittyverse full masthead lockup">
  <title>Wittyverse full masthead — wordmark + mono Cycle 247 tag + kicker + marquee</title>
  <desc>The brand identity lockup: orange marquee strip on top, all-caps WITTYVERSE wordmark in Lilita One with ink + lime stacked shadow, mono "Cycle 247" tag to the right (deadpan-world bridge), kicker line "Operated by Winston, Dr. W. Yeti PhD" beneath, all on purple-mid masthead ground with ink bottom border.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@500;800&family=JetBrains+Mono:wght@700&display=swap');
      .wm {
        font-family: 'Lilita One', 'Arial Black', sans-serif;
        font-weight: 400;
        font-size: 88px;
        letter-spacing: 0;
      }
      .marquee-text {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 16px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        fill: #1A0A2E;
      }
      .mono-tag-text {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 16px;
        letter-spacing: 0.12em;
        fill: #FF6B2C;
      }
      .kicker {
        font-family: 'Inter', sans-serif;
        font-style: italic;
        font-weight: 500;
        font-size: 18px;
        fill: #FFF4E6;
      }
    ]]></style>
  </defs>

  <rect x="0" y="40" width="1600" height="220" fill="#5C27A3"/>
  <rect x="0" y="256" width="1600" height="4" fill="#1A0A2E"/>
  <rect x="0" y="0" width="1600" height="40" fill="#FF6B2C"/>
  <rect x="0" y="36" width="1600" height="4" fill="#1A0A2E"/>

  <g transform="translate(40, 25)">
    <text class="marquee-text" x="0" y="0">FREE SHIPPING OVER $50</text>
    <text class="marquee-text" x="290" y="0" fill="#1A0A2E">✦</text>
    <text class="marquee-text" x="320" y="0">DISPATCHED TUESDAYS</text>
    <text class="marquee-text" x="585" y="0" fill="#1A0A2E">✦</text>
    <text class="marquee-text" x="615" y="0">HAND-INSPECTED BEFORE EXPORT</text>
    <text class="marquee-text" x="990" y="0" fill="#1A0A2E">✦</text>
    <text class="marquee-text" x="1020" y="0">RESTOCKED CYCLE 247</text>
  </g>

  <g transform="translate(120, 170)">
    <g transform="skewX(-6)">
      <text class="wm" fill="#9EE83D" x="6" y="6">WITTYVERSE</text>
      <text class="wm" fill="#1A0A2E" x="3" y="3">WITTYVERSE</text>
      <text class="wm" fill="#FF6B2C" x="0" y="0">WITTYVERSE</text>
    </g>
  </g>

  <g transform="translate(780, 115)">
    <rect x="0" y="0" width="160" height="32" fill="#1A0A2E" stroke="#FF6B2C" stroke-width="1.5" rx="3"/>
    <text class="mono-tag-text" x="14" y="22">CYCLE 247</text>
  </g>

  <text class="kicker" x="123" y="208">Operated by Winston, Dr. W. Yeti PhD</text>
</svg>
