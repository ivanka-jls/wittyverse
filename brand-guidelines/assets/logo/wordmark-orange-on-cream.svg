<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 380" width="1700" height="380" role="img" aria-label="Wittyverse wordmark — orange on cream">
  <title>Wittyverse — wordmark, orange on cream</title>
  <desc>Lilita One typeset, all-caps WITTYVERSE, −6° italic skew, ink + orange-deep stacked shadow tightened for light-ground contrast. Use on cream / paper / receipt / interior packaging surfaces. Never on raw white.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');
      .ground { fill: #FFF4E6; }
      .shadow-1 { fill: #1A0A2E; }
      .shadow-2 { fill: #E55A1A; }
      .fill { fill: #FF6B2C; }
      .wm {
        font-family: 'Lilita One', 'Arial Black', sans-serif;
        font-weight: 400;
        font-size: 200px;
        letter-spacing: 0;
      }
    ]]></style>
  </defs>
  <rect class="ground" x="0" y="0" width="1700" height="380"/>
  <g transform="translate(120, 270) skewX(-6)">
    <text class="wm shadow-2" x="8" y="8">WITTYVERSE</text>
    <text class="wm shadow-1" x="4" y="4">WITTYVERSE</text>
    <text class="wm fill" x="0" y="0">WITTYVERSE</text>
  </g>
</svg>
